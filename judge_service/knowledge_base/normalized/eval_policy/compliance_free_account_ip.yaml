  - "Есть явное упоминание бесплатного счета"
  - "Есть эквивалентный смысл отсутствия платы"

fail_conditions:
  - "Бесплатность счета не озвучена"
  - "Есть только общее упоминание тарифа без смысла бесплатности"

null_conditions:
  - "Продуктовая часть разговора не состоялась"

