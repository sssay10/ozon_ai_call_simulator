id: eval.compliance_account_docs_ip
version: 1
doc_type: eval_policy
rule_kind: reference
priority: critical

title: "Политика оценки compliance_account_docs_ip"

criterion_tags:
  - compliance_account_docs_ip

scenario_tags:
  - novice_ip_no_account_easy
  - novice_ip_no_account_medium

applicability:
  stage:
    - body_block
  legal_form:
    - ip
  channel:
    - phone

canonical_rule: >
  Критерий считается выполненным, если менеджер явно сообщил про
  необходимость оригинала паспорта РФ. Общих слов про документы,
  фото документов или просто паспорт недостаточно.

pass_conditions:
  - "Есть явное требование оригинала паспорта РФ"
  - "Есть эквивалентная формулировка про оригинал паспорта Российской Федерации"

fail_conditions:
  - "Есть только общее упоминание паспорта без оригинала и РФ"
  - "Менеджер просит фото документов или размытые документы"

null_conditions:
  - "Разговор не дошел до обсуждения документов"

retrieval_hints:
  keywords:
    - оригинал паспорта
    - паспорт рф
    - российской федерации
    - фото документов
    - документы
  evidence_window: body_block
  priority_boost: 1.3

source:
  source_type: manual
  source_name: eval_design_v2
