id: greeting.no_bank.self_intro
version: 1
doc_type: policy
rule_kind: forbidden
priority: critical

title: "Нельзя использовать слово 'банк' в самопрезентации"

criterion_tags:
  - greeting_correct

scenario_tags:
  - novice_ip_no_account_easy
  - novice_ip_no_account_medium

applicability:
  stage:
    - greeting_block
  legal_form:
    - ip
  channel:
    - phone

canonical_rule: >
  В приветствии менеджер не должен использовать слово "банк"
  в самопрезентации. Корректно представиться именем и сказать,
  что звонок из Ozon.

positive_examples:
  - "Добрый день, это Анна из Ozon."
  - "Здравствуйте, меня зовут Анна, звоню из Ozon."

negative_examples:
  - "Добрый день, это Анна из Ozon Банка."
  - "Здравствуйте, вас беспокоят из банка Ozon."

retrieval_hints:
  keywords:
    - банк
    - ozon банк
    - озон банк
    - представился
    - приветствие
  evidence_window: greeting_block
  priority_boost: 2.0

source:
  source_type: excel
  source_name: bank_docs.xlsx