id: onboarding.must_offer_free_account
version: 1
doc_type: policy
rule_kind: required
priority: high

title: "Нужно сообщить про бесплатный расчетный счет"

criterion_tags:
  - compliance_free_account_ip

scenario_tags:
  - novice_ip_no_account_easy
  - novice_ip_no_account_medium

applicability:
  stage:
    - body_block
  legal_form:
    - ip
  channel:
    - phone

canonical_rule: >
  Менеджер должен сообщить клиенту, что ему доступен бесплатный
  расчетный счет, либо донести эквивалентный смысл отсутствия платы.

positive_examples:
  - "У вас есть возможность открыть бесплатный расчетный счет."
  - "Расчетный счет можно открыть бесплатно."

negative_examples:
  - "У нас есть разные тарифы."
  - "Потом посмотрите условия в приложении."

retrieval_hints:
  keywords:
    - бесплатный счет
    - бесплатный расчётный счёт
    - бесплатно
    - расчетный счет
    - расчётный счёт
  evidence_window: body_block
  priority_boost: 1.5

source:
  source_type: excel
  source_name: bank_docs.xlsx