port: 7880

rtc:
  # Use a narrow UDP port range to limit resource usage.
  port_range_start: 62000
  port_range_end: 62010

  # WebRTC over TCP (matches docker-compose port 7881).
  tcp_port: 7881

  # Manually advertise this node's public IP in ICE candidates
  # (so we don't depend on outbound STUN auto-detection).
  use_external_ip: false
  node_ip: 91.218.112.40

turn:
  # Enable the built-in TURN server for relaying media when direct
  # UDP connectivity is not possible.
  enabled: true
  udp_port: 3478
  # Advertise TURN on your main domain; clients will connect
  # directly to this server on UDP 3478.
  domain: daily-inspirational-quotes.online
  tls_port: 0
  external_tls: false

keys:
  # LiveKit API keys generated by livekit/generate.
  APInV4SJJc7dh45: zvehTHVrzlSmtVnM2mDhhHMk10mt6Tof5znYxzpF19V

room:
  enabled_codecs:
    - mime: audio/opus

